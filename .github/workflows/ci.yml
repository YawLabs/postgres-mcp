name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # We run postgres manually (not as a service) because GitHub Actions
      # service `options` are passed verbatim to `docker create`, where
      # `-c shared_preload_libraries=...` collides with docker's own `-c`
      # (--cpu-shares) flag. `docker run ... postgres:16 -c ...` passes the
      # arg to the postmaster, which is what we actually want.
      - name: Start postgres with pg_stat_statements preloaded
        run: |
          docker run -d --name postgres \
            -p 5432:5432 \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres_mcp_test \
            postgres:16 \
            -c shared_preload_libraries=pg_stat_statements
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres >/dev/null 2>&1; then
              echo "postgres ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "postgres failed to become ready in 60s"
              docker logs postgres
              exit 1
            fi
            sleep 2
          done

      - name: Enable pg_stat_statements extension
        env:
          PGPASSWORD: postgres
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d postgres_mcp_test -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Run integration tests
        env:
          POSTGRES_MCP_INTEGRATION: '1'
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres_mcp_test
        run: npm run test:integration

      - name: Dump postgres logs on failure
        if: failure()
        run: docker logs postgres || true
