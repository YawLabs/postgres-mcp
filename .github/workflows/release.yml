name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published package
        working-directory: ${{ runner.temp }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in 1 2 3 4 5; do
            if npm view "@yawlabs/postgres-mcp@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for @yawlabs/postgres-mcp@${VERSION} to appear on the registry (attempt $i)..."
            sleep 5
          done
          OUTPUT=$(npx -y "@yawlabs/postgres-mcp@${VERSION}" --version)
          echo "npx output: $OUTPUT"
          if [ "$OUTPUT" != "$VERSION" ]; then
            echo "Expected $VERSION, got $OUTPUT" >&2
            exit 1
          fi
