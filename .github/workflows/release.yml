name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test published package
        working-directory: ${{ runner.temp }}
        run: |
          # npm registry propagation is usually <30s but occasionally stalls
          # for several minutes (observed ~7min on v0.1.0 initial publish).
          # Give it up to 10 minutes before failing the release.
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 60); do
            if npm view "@yawlabs/postgres-mcp@${VERSION}" version >/dev/null 2>&1; then
              echo "Registry reports @yawlabs/postgres-mcp@${VERSION} available (attempt $i)"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Gave up waiting for @yawlabs/postgres-mcp@${VERSION} after 10 minutes." >&2
              exit 1
            fi
            echo "Waiting for @yawlabs/postgres-mcp@${VERSION} to appear on the registry (attempt $i/60)..."
            sleep 10
          done
          OUTPUT=$(npx -y "@yawlabs/postgres-mcp@${VERSION}" --version)
          echo "npx output: $OUTPUT"
          if [ "$OUTPUT" != "$VERSION" ]; then
            echo "Expected $VERSION, got $OUTPUT" >&2
            exit 1
          fi
